<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dobu Cam</title>
<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #fcfcfc;
    color: #2b241f;
}

.header {
    display: flex;
    justify-content: center;
    padding: 20px;
    background: #ffffff;
    border-bottom: 2px solid #f2f2f2;
}

.header img {
    width: 220px;
    max-width: 70vw;
}

.container {
    display: flex;
    padding: 20px;
    gap: 20px;
}

.left {
    flex: 1;
    min-width: 280px;
}

.card {
    background: #fccd86;
    padding: 18px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.card h3 {
    margin: 0 0 12px;
}

.ok {
    color: #15803d;
    font-weight: bold;
}

.bad {
    color: #b42318;
    font-weight: bold;
}

.camera {
    flex: 1.4;
    background: #2f2f2f;
    border-radius: 12px;
    min-height: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    box-shadow: 0 3px 8px rgba(0,0,0,0.10);
}

.camera img {
    width: 100%;
    height: 100%;
    min-height: 420px;
    object-fit: cover;
}

.camera-placeholder {
    color: #ffffff;
    text-align: center;
    padding: 26px;
    line-height: 1.5;
}

.info {
    color: #6b4e2e;
    font-size: 14px;
    line-height: 1.5;
    margin-top: 12px;
}

.events {
    max-height: 170px;
    overflow: auto;
}

.event {
    border-top: 1px solid rgba(80, 54, 25, 0.18);
    padding: 9px 0;
    font-size: 14px;
}

.event:first-child {
    border-top: 0;
}

.event small {
    color: #6b4e2e;
}

@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }
}
</style>
</head>
<body>
<div class="header">
    <img src="logo.png" alt="Dobu Monitor">
</div>

<div class="container">
    <div class="left">
        <div class="card">
            <h3>Status do Animal</h3>
            <p id="status">Carregando...</p>
            <p id="hora">Ultima vez visto: --</p>
            <p id="info" class="info">Camera: aguardando conexao</p>
        </div>

        <div class="card">
            <h3>Historico</h3>
            <div id="events" class="events">Aguardando primeira saida da camera...</div>
        </div>
    </div>

    <div class="camera">
        <img id="cameraFrame" alt="Imagem real da camera Dobu-CAM" style="display:none;">
        <div id="cameraPlaceholder" class="camera-placeholder">
            Aguardando camera real.<br>
            Rode <strong>python camera_iot.py</strong> para aparecer a imagem aqui.
        </div>
    </div>
</div>

<script>
async function atualizarStatus() {
    try {
        const res = await fetch("http://127.0.0.1:5000/status");
        const data = await res.json();

        const statusText = document.getElementById("status");
        const hora = document.getElementById("hora");

        if (data.pet_detected) {
            statusText.innerHTML = "ANIMAL PRESENTE";
            statusText.className = "ok";
        } else {
            statusText.innerHTML = "ANIMAL AUSENTE";
            statusText.className = "bad";
        }

        hora.innerHTML = "Ultima vez visto: " + formatarData(data.last_seen);
        document.getElementById("info").textContent = "Camera: " + (data.telemetry?.sensor || data.source || "conectada") + " | HTTP";
        document.getElementById("events").innerHTML = montarHistorico(data.events || []);
    } catch (err) {
        const statusText = document.getElementById("status");
        statusText.innerHTML = "CAMERA OFFLINE";
        statusText.className = "bad";
    }
}

function atualizarCamera() {
    const img = document.getElementById("cameraFrame");
    img.src = "http://127.0.0.1:5000/camera-frame?t=" + Date.now();
}

function formatarData(valor) {
    if (!valor || valor === "--") return "--";
    return new Date(valor).toLocaleString("pt-BR");
}

function montarHistorico(eventos) {
    if (!eventos.length) return "Não há registro de histórico ainda...";
    return eventos.slice().reverse().map((evento) => {
        return `<div class="event"><strong>${evento.message}</strong><br><small>Ultima vez visto: ${formatarData(evento.last_seen)}</small></div>`;
    }).join("");
}

document.getElementById("cameraFrame").addEventListener("load", () => {
    document.getElementById("cameraFrame").style.display = "block";
    document.getElementById("cameraPlaceholder").style.display = "none";
});

document.getElementById("cameraFrame").addEventListener("error", () => {
    document.getElementById("cameraFrame").style.display = "none";
    document.getElementById("cameraPlaceholder").style.display = "block";
});

setInterval(atualizarStatus, 1500);
setInterval(atualizarCamera, 1000);
atualizarStatus();
atualizarCamera();
</script>
</body>
</html>
