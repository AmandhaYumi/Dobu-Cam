<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dobu Monitor</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #fcfcfc;
}

.header {
    display: flex;
    justify-content: center;
    padding: 20px;
    background: #ffffff;
    border-bottom: 2px solid #f2f2f2;
}

.header img {
    width: 220px;
}

.container {
    display: flex;
    padding: 20px;
    gap: 20px;
}

.left {
    flex: 1;
}

.card {
    background: #fccd86;
    padding: 18px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

.ok {
    color: green;
    font-weight: bold;
}

.bad {
    color: red;
    font-weight: bold;
}

.camera {
    flex: 1;
    background: #eee;
    border-radius: 12px;
    height: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #555;
}

@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }
}

</style>

</head>

<body>

<div class="header">
    <img src="logo.png">
</div>


<div class="container">
    <div class="left">

        <div class="card">
            <h3>🐶 Status do Animal</h3>
            <p id="status">Carregando...</p>
            <p id="hora">Última vez visto: --</p>
        </div>

    </div>
    <div class="camera">
        📷 Dobu-CAM
    </div>

</div>

<script>

async function atualizar() {
    try {
        const res = await fetch("http://127.0.0.1:5000/status");
        const data = await res.json();

        const statusText = document.getElementById("status");
        const hora = document.getElementById("hora");

        if (data.pet_detected) {
            statusText.innerHTML = "ANIMAL PRESENTE 🟢";
            statusText.className = "ok";
        } else {
            statusText.innerHTML = "ANIMAL AUSENTE 🔴";
            statusText.className = "bad";
        }

        hora.innerHTML = "Última vez visto: " + data.last_seen;

    } catch (err) {
        console.log("Erro ao conectar backend");
    }
}

setInterval(atualizar, 2000);
atualizar();

</script>

</body>
</html>
